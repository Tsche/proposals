<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #fafafa;
        }
        h1 {
            color: #222;
            border-bottom: 3px solid #0066cc;
            padding-bottom: 10px;
        }
        h2 {
            color: #444;
            margin-top: 30px;
        }
        h3 {
            color: #555;
            margin-top: 20px;
        }
        .paper, .issue {
            background: white;
            border-left: 4px solid #0066cc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }
        .issue {
            border-left-color: #009900;
        }
        .paper.unpublished, .issue.unpublished {
            background: #fffbf0;
            border-left-color: #ff9900;
        }
        .paper-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
        }
        .paper-id {
            font-weight: bold;
            color: #0066cc;
        }
        .unpublished {
            background: #ff9900;
        }
        .revision-item {
            margin: 10px 0 10px 20px;
            padding-left: 10px;
            border-left: 2px solid #ddd;
        }
        .revision-link {
            color: #0066cc;
            text-decoration: none;
        }
        .revision-link:hover {
            text-decoration: underline;
        }
        .badge {
            display: inline-block;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 8px;
        }
        .badge.unpublished {
            background: #ff9900;
        }
        .badge.accepted {
            background: #03cc00;
        }
        .revision-date {
            color: #666;
            font-size: 0.9em;
        }
        .sections {
            margin-top: 20px;
        }
        .container {
            margin-top: 10px;
        }
        html.dark-mode body {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        html.dark-mode h1 {
            color: #e0e0e0;
            border-bottom-color: #4a9eff;
        }
        html.dark-mode h2, html.dark-mode h3 {
            color: #d0d0d0;
        }
        html.dark-mode .paper, html.dark-mode .issue {
            background: #2d2d2d;
            border-left-color: #4a9eff;
        }
        html.dark-mode .issue {
            border-left-color: #4caf50;
        }
        html.dark-mode .paper.unpublished, html.dark-mode .issue.unpublished {
            background: #332200;
            border-left-color: #ffb84d;
        }
        html.dark-mode .paper-id {
            color: #4a9eff;
        }
        html.dark-mode .revision-link {
            color: #4a9eff;
        }
        html.dark-mode .revision-date {
            color: #a0a0a0;
        }
        html.dark-mode .badge.unpublished {
            background: #ffb84d;
            color: #1e1e1e;
        }
        html.dark-mode .badge.accepted {
            background: #4caf50;
            color: #1e1e1e;
        }
    </style>
</head>
<body>
    <div style="position: relative;">
        <button id="theme-toggle" style="position: fixed; top: 20px; right: 20px; background: none; border: none; cursor: pointer; font-size: 24px; z-index: 1000;">🌙</button>
    </div>
    <script>
        (function() {
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            
            let isDark;
            if (saved) {
                isDark = saved === 'dark';
            } else {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            
            if (isDark) {
                html.classList.add('dark-mode');
                html.classList.remove('light-mode');
            } else {
                html.classList.add('light-mode');
                html.classList.remove('dark-mode');
            }
            
            const updateButton = () => {
                const toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.textContent = html.classList.contains('dark-mode') ? '☀️' : '🌙';
                }
            };
            
            document.addEventListener('DOMContentLoaded', () => {
                updateButton();
                const toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.addEventListener('click', () => {
                        html.classList.toggle('dark-mode');
                        html.classList.toggle('light-mode');
                        localStorage.setItem('theme', html.classList.contains('dark-mode') ? 'dark' : 'light');
                        updateButton();
                    });
                }
            });
        })();
    </script>
    <h1>${title}</h1>
    <div class="sections">
      <h2>Papers</h2>
        ${papers}
      <h2>Issues</h2>
      <h3>LWG Issues</h3>
        ${lwg}
      <h3>CWG Issues</h3>
        ${cwg}
    </div>
</body>
</html>
